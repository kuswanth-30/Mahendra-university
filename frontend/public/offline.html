<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Found - Offline</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Consolas', 'Courier New', monospace;
      background: #0D0D19;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      text-align: center;
      max-width: 400px;
    }
    
    .icon {
      font-size: 64px;
      margin-bottom: 24px;
    }
    
    h1 {
      font-size: 24px;
      font-weight: bold;
      color: #ff0040;
      margin-bottom: 16px;
      letter-spacing: 0.1em;
    }
    
    p {
      font-size: 14px;
      color: #6b6b7b;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    
    .status {
      display: inline-block;
      padding: 8px 16px;
      background: #1a1a2e;
      border: 1px solid #2a2a3e;
      border-radius: 4px;
      font-size: 12px;
      color: #8b6914;
      margin-bottom: 24px;
    }
    
    .status::before {
      content: '●';
      color: #8b6914;
      margin-right: 8px;
    }
    
    button {
      font-family: 'Consolas', 'Courier New', monospace;
      padding: 12px 24px;
      background: #9333ea;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: background 0.2s;
    }
    
    button:hover {
      background: #a855f7;
    }
    
    .info {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid #2a2a3e;
      font-size: 11px;
      color: #444444;
    }
    
    .cached-data {
      color: #00ff41;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>OFFLINE_MODE</h1>
    <div class="status">MESH_DISCONNECTED</div>
    <p>
      No network connectivity detected. The app is running in offline mode with cached data.
    </p>
    <p class="cached-data">
      ✓ Local messages and alerts are still available
    </p>
    <button onclick="window.location.reload()">
      Attempt Reconnect
    </button>
    <div class="info">
      404 FOUND v1.0 • Tactical Emergency Network
    </div>
  </div>
</body>
</html>
