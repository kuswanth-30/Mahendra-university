name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: |
            frontend/.next/cache
            frontend/out
          key: ${{ runner.os }}-nextjs-${{ hashFiles('frontend/package.json', 'frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-

      - name: Cache Firebase CLI
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase
          key: firebase-cli-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            firebase-cli-

      - name: Install dependencies
        run: npm install --prefer-offline --no-audit
        timeout-minutes: 5

      - name: Install Firebase CLI
        run: npm install -g firebase-tools
        timeout-minutes: 2

      - name: Build static export
        run: npm run build:static
        timeout-minutes: 8
        env:
          NODE_ENV: production
          NODE_OPTIONS: --max-old-space-size=4096
          NEXT_TELEMETRY_DISABLED: 1

      - name: List build output
        run: ls -la frontend/out/ && du -sh frontend/out/

      - name: Deploy to Firebase
        run: firebase deploy --only hosting --token "${{ secrets.FIREBASE_TOKEN }}" --non-interactive --debug
        timeout-minutes: 3
